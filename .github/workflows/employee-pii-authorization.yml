name: Employee PII authorization

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: employee-pii-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright employee PII suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      E2E_UNAUTHORIZED_EMAIL: ${{ secrets.E2E_UNAUTHORIZED_EMAIL }}
      E2E_UNAUTHORIZED_PASSWORD: ${{ secrets.E2E_UNAUTHORIZED_PASSWORD }}
      E2E_EMPLOYEE_PII_SENTINEL: ${{ secrets.E2E_EMPLOYEE_PII_SENTINEL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate security test fixtures
        shell: bash
        run: |
          test -n "$E2E_UNAUTHORIZED_EMAIL" || { echo "::error::Missing E2E_UNAUTHORIZED_EMAIL repository secret"; exit 1; }
          test -n "$E2E_UNAUTHORIZED_PASSWORD" || { echo "::error::Missing E2E_UNAUTHORIZED_PASSWORD repository secret"; exit 1; }
          test -n "$E2E_EMPLOYEE_PII_SENTINEL" || { echo "::error::Missing E2E_EMPLOYEE_PII_SENTINEL repository secret"; exit 1; }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run employee PII authorization suite
        run: bunx playwright test e2e/employee-pii-authorization.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: employee-pii-playwright-report-${{ github.run_attempt }}
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload failure screenshots and traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: employee-pii-failure-artifacts-${{ github.run_attempt }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 14
